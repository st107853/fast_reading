<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Reader</title>
    <link rel="stylesheet" type="text/css" href="/static/style.css">
    <link rel="stylesheet" type="text/css" href="/static/book_page.css">
    <script src="/static/script.js" defer></script>
</head>
<body>
    <div class="fr-container">
        
        {{template "navbar" .}}
        {{template "settingsModal" .}}

        <div class="bp-book-header">
            <div class="bp-title-block">
                <h2>{{.BookBase.Name}}</h2>
                <h4>{{.Chapter.Title}}</h4>
            </div>
        </div>
        <div class="bp-reading-grid">

            <section class="bp-word-box" id="book-text">---</section>

            <section class="bp-controls">
                <input type="number" id="speed" value="600" min="100" onchange="updateSpeed()">
                <label class="bp-switch fr-switch">
                    <input type="checkbox" id="play"/>
                    <span class="bp-switch-play"></span>
                </label>
            </section>

           

            <section class="bp-book-text-area">
                <div class="fr-book-text" id="scrollable-content-reading">{{.Chapter.Text}}</div>
            </section>

            <section class="bp-book-scroll-control">
                <input type="range" id="scrollRange" class="fr-scroll-slider--vertical" value="50" min="0" max="100" aria-label="Reading progress slider">
            </section>
        </div>
    </div>
    <script>
        const text = `{{.Chapter.Text}}`;
        const words = text.split(/\s+/);
        const play = document.getElementById('play');

        const pathParts = window.location.pathname.split('/');

        
        let bookId = parseInt(pathParts[3]) || 0;
        let chapterId = parseInt(pathParts[4]) || 0;
        let index = parseInt(pathParts[5]) || 0;

        console.log("Parsed from URL - bookId:", bookId, ", chapterId:", chapterId, ", index:", index);

        let intervalId = null;
        let speed = 600;

        console.log("Initial index from URL:", index);

        if (index < words.length) {
            document.getElementById("book-text").innerText = words[index];
        }

        function updateText() {
            if (index < words.length) {
                document.getElementById("book-text").innerText = words[index];
                index++;
            } else {
                stopReading();
            }
        }

        async function saveProgress() {
            
            const url = `/library/${bookId}/${chapterId}/${index}`;

            try {
                const response = await fetch(url, { method: 'PUT' });
                if (!response.ok) console.error("Failed to save progress");
            } catch (err) {
                console.error("Error saving progress:", err);
            }
        }

        function stopReading() {
            clearInterval(intervalId);
            intervalId = null;
            play.checked = false;
            saveProgress();
        }

        function startReading() {
            if (!intervalId) {
                intervalId = setInterval(updateText, speed);
            }
        }

        play.addEventListener('change', (e) => {
            if (e.target.checked) {
                startReading();
            } else {
                stopReading();
            }
        });

        function updateSpeed() {
            speed = parseInt(document.getElementById("speed").value, 10);
            if (intervalId) {
                clearInterval(intervalId);
                intervalId = setInterval(updateText, speed);
            }
        }
    </script>
</body>
</html>
