<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>User Page</title>
    <link rel="stylesheet" type="text/css" href="/static/style.css">
    <link rel="stylesheet" type="text/css" href="/static/user_page.css">
    <script src="/static/user_page.js"></script>
    <script src="/static/script.js" defer></script>
    <script src="/static/labels.js" defer></script>
</head>
<body>
  <div class="up-container">
    <header class="up-user-header">
        <div class="header-group-left">
            <a href="/library/">
            <div class="fr-icon-button fr-navbar__logo-btn" aria-label="Go to home page"></div>
            </a>

            <button class="fr-icon-button fr-navbar__customize-btn fr-navbar-icon-btn fr-modal__opener" aria-label="Open settings menu" data-modal-target=".fr-modal--settings"></button>
        </div>

        <div class="up-header-group-center">
            <button class="fr-icon-button fr-navbar__avatar-btn up-avatar-icon--big" id="avatarBtn" aria-label="User avatar"></button>
        </div>

        <div class="up-header-group-right">
            <div class="up-user-info">
                <h3 class="up-user-name">{{.Name}}</h3>
                <!-- <span class="fr-label">100 Coins</span> -->
            </div>
        </div>
    </header>

    {{template "settingsModal" .}}

    <div class="fr-list fr-list--left fr-user-nav-tabs">
        <button class="fr-theme--white fr-btn--chosed fr-btn--large" data-target="#favBooks" aria-pressed="true">Favourite books</button>
        <button class="fr-theme--white fr-btn--large" data-target="#createdBooks" aria-pressed="false">Created books</button>

        <a href="/library/addbook/" class="fr-btn fr-btn-right fr-btn--large fr-theme--white">Create book</a>
    </div>
    <hr class="up-hr">

    <div id="favBooks">
        <div class="fr-list fr-list--left">
            {{range .FavouriteLabels}}
                <span class="fr-label fr-label--interactive" data-id="{{.LabelID}}" onclick="event.preventDefault(); applyFilters(3);">{{.Name}}</span>
            {{end}}
        </div>

        <section id="fav-results-container" class="objects fr-card-grid">
        {{range .FavouriteBooks}}
            {{template "bookCard" .}}
        {{end}}
      </section>
    </div>

    <div id="createdBooks" class="fr-hidden">
        <div class="fr-list fr-list--left">
            {{range .CreatedLabels}}
                <span class="fr-label fr-label--interactive" data-id="{{.LabelID}}" onclick="event.preventDefault(); applyFilters(2);">{{.Name}}</span>
            {{end}}
        </div>

      <section id="created-results-container" class="objects fr-card-grid">
        {{range .CreatedBooks}}
            {{template "bookCard" .}}
        {{end}}
      </section>
    </div>
</div>
</body>
</html>
